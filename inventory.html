<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - Desmond's Spares</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">🏍️ Desmond's <span>Spares</span></div>
    <div class="nav-links">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="inventory.html" class="active">📦 Inventory</a>
      <a href="sales.html">💰 Sales</a>
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </nav>

  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;">
      <div>
        <h1 class="page-title">📦 Inventory</h1>
        <p class="page-subtitle">Manage stock levels, restock items, and add new products</p>
      </div>
      <button class="btn btn-primary" onclick="openAddProductModal()">➕ Add New Product</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="filterInventory('all')">All</div>
      <div class="tab" onclick="filterInventory('in-stock')">✅ In Stock</div>
      <div class="tab" onclick="filterInventory('out-stock')">❌ Out of Stock</div>
      <div class="tab" onclick="filterInventory('low')">⚠️ Low Stock</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Type</th>
            <th>Vehicle</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Add Product Modal -->
  <div class="modal-overlay" id="addProductModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 class="modal-title">➕ Add New Product</h3>
        <button class="close-btn" onclick="closeAddModal()">&times;</button>
      </div>
      <form id="addProductForm" onsubmit="handleAddProduct(event)">
        <div class="grid grid-2" style="gap:1rem;">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="newName" placeholder="e.g. Brake Pads" required>
          </div>
          <div class="form-group">
            <label>Type/Variant</label>
            <input type="text" id="newType" placeholder="e.g. Front, Rear, DOT 4" required>
          </div>
        </div>
        <div class="grid grid-2" style="gap:1rem;">
          <div class="form-group">
            <label>Category</label>
            <select id="newCategory" onchange="updateTypeOptions()" required>
              <option value="">Select category</option>
            </select>
          </div>
          <div class="form-group">
            <label>Vehicle Type</label>
            <select id="newVehicleType" required>
              <option value="vehicle">🚗 Vehicle</option>
              <option value="moto">🏍️ Motorcycle</option>
              <option value="both">🚗🏍️ Both</option>
            </select>
          </div>
        </div>
        <div class="grid grid-2" style="gap:1rem;">
          <div class="form-group">
            <label>Price (UGX)</label>
            <input type="number" id="newPrice" placeholder="e.g. 4500" min="1" required>
          </div>
          <div class="form-group">
            <label>Initial Stock</label>
            <input type="number" id="newStock" placeholder="e.g. 10" min="0" required>
          </div>
        </div>
        <div class="form-group">
          <label>Minimum Stock Alert Level</label>
          <input type="number" id="newMinStock" placeholder="e.g. 5" min="1" value="5" required>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%; padding:0.9rem;">💾 Save Product</button>
      </form>
    </div>
  </div>

  <!-- Restock Modal -->
  <div class="modal-overlay" id="restockModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">📦 Restock Item</h3>
        <button class="close-btn" onclick="closeRestockModal()">&times;</button>
      </div>
      <div id="restockContent"></div>
    </div>
  </div>

  <script src="../js/shared.js"></script>
  <script>
    if (!Auth.checkAuth()) throw new Error('Not authenticated');

    let currentFilter = 'all';
    let restockProductId = null;

    function logout() {
      Auth.logout();
      window.location.href = 'login.html';
    }

    function renderInventory() {
      const tbody = document.getElementById('inventoryTable');
      let products = Storage.getProducts();

      if (currentFilter === 'in-stock') products = products.filter(p => p.stock > 0);
      else if (currentFilter === 'out-stock') products = products.filter(p => p.stock === 0);
      else if (currentFilter === 'low') products = products.filter(p => p.stock > 0 && p.stock <= p.minStock);

      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:2rem; color:var(--text-light);">No products found</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(p => {
        const status = Utils.getStockStatus(p);
        const catInfo = CATEGORIES[p.category] || { name: p.category, icon: '📦' };
        const isAdmin = Auth.isAdmin();
        return `
          <tr>
            <td><strong>${p.name}</strong></td>
            <td>${catInfo.icon} ${catInfo.name}</td>
            <td>${p.type}</td>
            <td>${p.vehicleType === 'both' ? '🚗🏍️' : p.vehicleType === 'vehicle' ? '🚗' : '🏍️'} ${p.vehicleType}</td>
            <td style="font-weight:700;">${Utils.formatMoney(p.price)}</td>
            <td style="font-weight:700; ${p.stock === 0 ? 'color:var(--danger)' : p.stock <= p.minStock ? 'color:var(--warning)' : 'color:var(--success)'};">${p.stock}</td>
            <td><span class="badge ${status.badge}">${status.text}</span></td>
            <td>
              <button class="btn btn-sm btn-success" onclick="openRestockModal(${p.id})">📦 Restock</button>
              ${isAdmin ? `<button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})" style="margin-left:0.3rem;">🗑️</button>` : ''}
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterInventory(filter) {
      document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      currentFilter = filter;
      renderInventory();
    }

    // Add Product Modal
    function openAddProductModal() {
      if (!Auth.isAdmin()) {
        Utils.toast('Only admin can add new products', 'error');
        return;
      }
      const select = document.getElementById('newCategory');
      select.innerHTML = '<option value="">Select category</option>' +
        Utils.getCategories().map(c => `<option value="${c.key}">${c.icon} ${c.name}</option>`).join('');
      document.getElementById('addProductModal').classList.add('active');
    }

    function closeAddModal() {
      document.getElementById('addProductModal').classList.remove('active');
      document.getElementById('addProductForm').reset();
    }

    function handleAddProduct(e) {
      e.preventDefault();
      const product = {
        name: document.getElementById('newName').value,
        type: document.getElementById('newType').value,
        category: document.getElementById('newCategory').value,
        vehicleType: document.getElementById('newVehicleType').value,
        price: parseInt(document.getElementById('newPrice').value),
        stock: parseInt(document.getElementById('newStock').value),
        minStock: parseInt(document.getElementById('newMinStock').value),
        image: CATEGORIES[document.getElementById('newCategory').value]?.icon || '📦'
      };
      Storage.addProduct(product);
      Utils.toast('✅ Product added successfully!');
      closeAddModal();
      renderInventory();
    }

    // Restock Modal
    function openRestockModal(productId) {
      restockProductId = productId;
      const products = Storage.getProducts();
      const p = products.find(x => x.id === productId);
      document.getElementById('restockContent').innerHTML = `
        <p style="margin-bottom:1rem;">Restocking: <strong>${p.name}</strong> (${p.type})</p>
        <p style="color:var(--text-light); margin-bottom:1rem;">Current stock: <strong>${p.stock}</strong></p>
        <div class="form-group">
          <label>Quantity to Add</label>
          <input type="number" id="restockQty" value="10" min="1" required>
        </div>
        <button class="btn btn-success" style="width:100%; padding:0.9rem;" onclick="confirmRestock()">📦 Confirm Restock</button>
      `;
      document.getElementById('restockModal').classList.add('active');
    }

    function closeRestockModal() {
      document.getElementById('restockModal').classList.remove('active');
      restockProductId = null;
    }

    function confirmRestock() {
      const qty = parseInt(document.getElementById('restockQty').value);
      if (qty < 1) return;
      Storage.restockProduct(restockProductId, qty);
      Utils.toast('✅ Stock updated successfully!');
      closeRestockModal();
      renderInventory();
    }

    async function deleteProduct(productId) {
      if (!Auth.isAdmin()) {
        Utils.toast('Only admin can delete products', 'error');
        return;
      }
      const confirmed = await Utils.confirm('Are you sure you want to delete this product?');
      if (confirmed) {
        Storage.deleteProduct(productId);
        Utils.toast('🗑️ Product deleted');
        renderInventory();
      }
    }

    // Close modals on overlay click
    document.getElementById('addProductModal').addEventListener('click', function(e) {
      if (e.target === this) closeAddModal();
    });
    document.getElementById('restockModal').addEventListener('click', function(e) {
      if (e.target === this) closeRestockModal();
    });

    renderInventory();
  </script>
</body>
</html>
